<div class="mb-3">
  <label class="form-label">基础镜像</label>
  <input name="dockerfile_base_image" type="text" class="form-control" placeholder="例如: golang:1.21-alpine" value="">
  <div class="form-text">可选，留空则使用应用镜像作为基础镜像</div>
</div>
<div class="mb-3">
  <label class="form-label">工作目录</label>
  <input name="dockerfile_workdir" type="text" class="form-control" value="/app">
</div>
<div class="mb-3">
  <label class="form-label">启动命令</label>
  <input name="dockerfile_cmd" type="text" class="form-control" placeholder="例如: ./myapp" value="">
  <div class="form-text">可选，留空则使用应用名称作为可执行文件</div>
</div>
